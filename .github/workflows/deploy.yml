name: Build & Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"   # Nightly rebuild at 3 AM UTC (disabled for now)

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ────────────────────────────────
      # 🔹 Checkout the repository
      # ────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures full history, required for committing back


      # ────────────────────────────────
      # 🔹 Set up Python for MkDocs
      # ────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ────────────────────────────────
      # 1️⃣ Install dependencies with pinned versions
      # ────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ────────────────────────────────
      # 2️⃣ Basic system updates (pandoc/curl no longer needed)
      # ────────────────────────────────
      - name: Update system packages
        run: sudo apt-get update

      # ────────────────────────────────
      # 3️⃣ Ensure imported folder exists (no longer auto-importing)
      # ────────────────────────────────
      - name: Ensure imported folder exists
        run: |
          mkdir -p docs/imported
          # Keep existing imported files but don't auto-update them
          echo "📂 Imported folder maintained (auto-import disabled)"

      # ────────────────────────────────
      # 3️⃣b Auto-import disabled - no longer committing imported files
      # ────────────────────────────────
      # Automated import functionality has been removed
      # Existing imported files are preserved but no longer auto-updated

      # ────────────────────────────────
      # 3️⃣c Update version number and build date
      # ────────────────────────────────
      - name: Update version and build date
        run: |
          current_date=$(date -u +'%Y-%m-%d')
          formatted_date=$(date -u +'%B %d, %Y')
          
          if [ -f "docs/_version.yml" ]; then
            # Read current version
            current_version=$(grep -oP 'version: "\K[^"]+' docs/_version.yml | head -1)
            echo "📌 Current version: $current_version"
            
            # Auto-increment patch version (e.g., 1.0.0 -> 1.0.1)
            IFS='.' read -ra VERSION_PARTS <<< "$current_version"
            MAJOR="${VERSION_PARTS[0]}"
            MINOR="${VERSION_PARTS[1]}"
            PATCH="${VERSION_PARTS[2]}"
            NEW_PATCH=$((PATCH + 1))
            new_version="${MAJOR}.${MINOR}.${NEW_PATCH}"
            
            # Update _version.yml
            sed -i "s/version: \"[^\"]*\"/version: \"$new_version\"/" docs/_version.yml
            sed -i "s/build_date: .*/build_date: \"$current_date\"/" docs/_version.yml
            
            # Update mkdocs.yml copyright with new version and date
            sed -i "s/Documentation Version [0-9]\+\.[0-9]\+\.[0-9]\+/Documentation Version $new_version/" mkdocs.yml
            sed -i "s/Last Updated: [^•]*/Last Updated: $formatted_date/" mkdocs.yml
            
            echo "✅ Updated version to: $new_version"
            echo "📅 Updated build date to: $current_date"
            echo "📄 Updated copyright in mkdocs.yml"
          else
            echo "⚠️ Version file not found, skipping version update"
          fi
          
      # ────────────────────────────────
      # 3️⃣d Commit version updates back to repo
      # ────────────────────────────────
      - name: Commit version updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/_version.yml mkdocs.yml
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "🔄 Auto-update: version bump and build date [skip ci]"
            git push
            echo "✅ Committed version updates"
          fi

      # ────────────────────────────────
      # 4️⃣ Build the MkDocs site
      # ────────────────────────────────
      - name: Build MkDocs site
        run: mkdocs build

      # ────────────────────────────────
      # 4️⃣a Verify built output (fail-fast guard)
      # ────────────────────────────────
      - name: Verify built site exists
        run: |
          if [ ! -f site/index.html ]; then
            echo "❌ ERROR: site/index.html not found after build"
            echo "This prevents uploading raw markdown to Pages"
            exit 1
          fi
          echo "✅ Built site verified: site/index.html exists"
          echo "📦 Site size: $(du -sh site | cut -f1)"

      # ────────────────────────────────
      # 4️⃣b PDF generation (disabled for now)
      #     Uncomment later if PDF export is required
      # ────────────────────────────────
      # - name: Generate PDFs for Imported Help pages
      #   run: |
      #     sudo apt-get install -y wkhtmltopdf
      #     mkdir -p site/pdfs
      #     declare -a pages=("xpf-help" "advanced-help" "mapper-help" "android-help")
      #     for page in "${pages[@]}"; do
      #       HTML_PATH="site/imported/${page}/index.html"
      #       PDF_PATH="site/pdfs/${page}.pdf"
      #       if [ -f "$HTML_PATH" ]; then
      #         echo "Generating PDF for ${page}..."
      #         wkhtmltopdf \
      #           --enable-local-file-access \
      #           --quiet \
      #           "file://$(pwd)/$HTML_PATH" \
      #           "$PDF_PATH" || true
      #       else
      #         echo "⚠️  Skipping ${page} (missing HTML at $HTML_PATH)"
      #       fi
      #     done
      #     echo "✅ PDF export complete"

      # ────────────────────────────────
      # 5️⃣ Upload for GitHub Pages
      # ────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ────────────────────────────────
  # 6️⃣ Deploy to GitHub Pages
  # ────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
